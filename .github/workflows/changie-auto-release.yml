name: changie

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  remind:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref != 'chore/changie-auto-release'
    runs-on: ubuntu-latest
    steps:
      - name: Check if PR contains a changie fragment
        id: check
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            // Default Changie fragments location
            const fragmentRe = /^\.changes\/unreleased\/.+\.ya?ml$/i;

            let page = 1;
            let found = false;

            while (!found) {
              const { data } = await github.rest.pulls.listFiles({
                owner, repo, pull_number, per_page: 100, page
              });
              if (!data.length) break;
              found = data.some(f => f.status !== "removed" && fragmentRe.test(f.filename));
              page++;
            }

            core.setOutput("has_fragment", found ? "true" : "false");

      - name: Find existing reminder comment
        id: fc
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "<!-- changie-reminder -->"

      - name: Create/Update reminder (missing fragment)
        if: steps.check.outputs.has_fragment == 'false'
        continue-on-error: true
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.fc.outputs.comment-id }}
          edit-mode: replace
          body: |
            <!-- changie-reminder -->
            👋 Deze PR mist nog een Changie changelog-fragment.

            Voeg er een toe:
            ```bash
            changie new
            ```
            Verwacht pad: `.changes/unreleased/*.yaml`

      - name: Create/Update reminder (fragment found)
        if: steps.check.outputs.has_fragment == 'true'
        continue-on-error: true
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.fc.outputs.comment-id }}
          edit-mode: replace
          body: |
            <!-- changie-reminder -->
            ✅ Changie-fragment gevonden.

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: "go.mod"

      - name: Install Changie
        run: go install github.com/miniscruff/changie@latest

      - name: Check for unreleased fragments
        id: fragments
        run: |
          if find .changes/unreleased -maxdepth 1 -type f \( -name '*.yaml' -o -name '*.yml' \) | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Batch and merge changelog
        if: steps.fragments.outputs.found == 'true'
        run: |
          changie batch auto
          changie merge

      - name: Create changelog PR
        if: steps.fragments.outputs.found == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          commit-message: "chore(changelog): auto-update after merge [skip ci]"
          branch: "chore/changie-auto-release"
          delete-branch: true
          title: "chore(changelog): auto-update release notes"
          body: |
            Automatisch aangemaakt door de Changie workflow na een merge naar `main`.

            Uitgevoerde stappen:
            - `changie batch auto`
            - `changie merge`
          add-paths: |
            CHANGELOG.md
            .changes/**
